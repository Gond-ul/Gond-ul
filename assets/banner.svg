<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="ALI SASANIAN — data engineer · new york — daemon online">
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect y="3" width="4" height="1" fill="#e8e6e1" opacity="0.028"/>
    </pattern>
  </defs>
  <style>
    text { font-family: 'JetBrains Mono', 'Cascadia Mono', 'SF Mono', Monaco, Menlo, ui-monospace, monospace; }
    @keyframes breathing { 0%, 100% { opacity: 0.88; } 50% { opacity: 1; } }
    @keyframes blink { 0%, 49.9% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes pulsering { 0%, 100% { opacity: 0.0; } 50% { opacity: 0.35; } }
    .breathing { animation: breathing 3.5s cubic-bezier(.4,0,.2,1) infinite; }
    .blinking  { animation: blink 1.06s steps(1) infinite; }
    .pulsing   { animation: pulse 2s cubic-bezier(.4,0,.2,1) infinite; }
    .pulsering { animation: pulsering 2s cubic-bezier(.4,0,.2,1) infinite; }
    @media (prefers-reduced-motion: reduce) {
      .breathing, .pulsing, .pulsering { animation: none; opacity: 1; }
    }
  </style>

  <!-- canvas -->
  <rect width="1200" height="300" fill="#050507"/>

  <!-- pill -->
  <rect x="40" y="36" width="1120" height="228" rx="36" fill="#0a0a0c" stroke="#e8e6e1" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="40" y="36" width="1120" height="228" rx="36" fill="url(#scan)"/>

  <!-- chrome: status left -->
  <circle cx="92" cy="78" r="8" fill="#7dd87d" class="pulsering"/>
  <circle cx="92" cy="78" r="4" fill="#7dd87d" class="pulsing"/>
  <text x="110" y="83" font-size="14" fill="#8a8780">daemon :~$</text>

  <!-- chrome: session right -->
  <text x="1112" y="83" font-size="12" fill="#4a4842" text-anchor="end">session · 0xa1742</text>

  <!-- wordmark -->
  <text x="600" y="168" font-size="58" font-weight="800" letter-spacing="-1.8" fill="#7dd87d" text-anchor="middle" class="breathing">ALI SASANIAN</text>

  <!-- subline -->
  <text x="600" y="204" font-size="16" fill="#8a8780" text-anchor="middle">data engineer · new york</text>

  <!-- prompt line -->
  <text x="92" y="240" font-size="14">
    <tspan fill="#7dd87d">daemon :~$ </tspan><tspan fill="#e8e6e1">whoami</tspan>
  </text>
  <rect x="238" y="228" width="9" height="15" fill="#7dd87d" class="blinking"/>

  <!-- link, functions run blue -->
  <text x="1112" y="240" font-size="14" fill="#4a90ff" text-anchor="end">alisasanian.com</text>
</svg>
